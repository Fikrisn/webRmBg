<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Remover - Hapus Background Gambar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #4a5568;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .upload-area {
            border: 3px dashed #cbd5e0;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            background: linear-gradient(45deg, #f7fafc, #edf2f7);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: linear-gradient(45deg, #e6fffa, #f0fff4);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.1);
        }

        .upload-area.dragover {
            border-color: #48bb78;
            background: linear-gradient(45deg, #f0fff4, #e6fffa);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4rem;
            color: #a0aec0;
            margin-bottom: 20px;
            display: block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }

        .upload-text {
            font-size: 1.2rem;
            color: #4a5568;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .upload-subtext {
            color: #718096;
            font-size: 0.9rem;
        }

        #fileInput {
            display: none;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tool-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .tool-group {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .tool-btn {
            padding: 8px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            background: white;
            color: #4a5568;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tool-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .tool-btn:hover {
            border-color: #667eea;
            transform: translateY(-1px);
        }

        .brush-size {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brush-size input {
            width: 80px;
        }

        .tolerance-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tolerance-control input {
            width: 80px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #48bb78, #38a169);
            color: white;
            box-shadow: 0 4px 15px rgba(72, 187, 120, 0.4);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(72, 187, 120, 0.6);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .preview-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        .preview-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .preview-container h3 {
            text-align: center;
            margin-bottom: 15px;
            color: #4a5568;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .preview-container canvas,
        .preview-container img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
            cursor: crosshair;
        }

        .preview-container canvas:hover,
        .preview-container img:hover {
            transform: scale(1.02);
        }

        .preview-container canvas.drawing {
            cursor: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e2e8f0;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px solid #feb2b2;
            display: none;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .success {
            background: #c6f6d5;
            color: #22543d;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px solid #9ae6b4;
            display: none;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .preview-area {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 20px;
                margin: 10px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 250px;
            }

            .tool-controls {
                flex-direction: column;
                gap: 15px;
                align-items: center;
            }

            .tool-group {
                flex-wrap: wrap;
                justify-content: center;
            }

            .brush-size, .tolerance-control {
                flex-direction: column;
                gap: 5px;
            }

            .brush-size input, .tolerance-control input {
                width: 150px;
            }
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            margin: 20px 0;
            overflow: hidden;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(45deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Background Remover</h1>
        
        <div class="upload-area" onclick="document.getElementById('fileInput').click()" ondrop="dropHandler(event);" ondragover="dragOverHandler(event);" ondragenter="dragEnterHandler(event);" ondragleave="dragLeaveHandler(event);">
            <div class="upload-icon">📷</div>
            <div class="upload-text">Klik untuk pilih gambar atau drag & drop</div>
            <div class="upload-subtext">Mendukung format: JPG, PNG, WEBP (Maks. 10MB)</div>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this.files[0])">
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                📁 Pilih Gambar
            </button>
            <button class="btn btn-secondary" id="processBtn" onclick="removeBackground()" disabled>
                ✨ Hapus Background
            </button>
            <button class="btn btn-secondary" id="downloadBtn" onclick="downloadResult()" disabled style="display: none;">
                💾 Download Hasil
            </button>
        </div>

        <!-- Tool Controls -->
        <div class="tool-controls" id="toolControls" style="display: none;">
            <div class="tool-group">
                <button class="tool-btn active" id="autoModeBtn" onclick="setMode('auto')">
                    🤖 Auto
                </button>
                <button class="tool-btn" id="manualModeBtn" onclick="setMode('manual')">
                    ✏️ Manual
                </button>
            </div>

            <div class="tool-group" id="manualTools" style="display: none;">
                <button class="tool-btn active" id="penBtn" onclick="setTool('pen')">
                    🖊️ Pen
                </button>
                <button class="tool-btn" id="eraserBtn" onclick="setTool('eraser')">
                    🧽 Eraser
                </button>
                <button class="tool-btn" id="undoBtn" onclick="undo()" disabled>
                    ↶ Undo
                </button>
                <button class="tool-btn" id="redoBtn" onclick="redo()" disabled>
                    ↷ Redo
                </button>
            </div>

            <div class="brush-size">
                <label>Brush Size:</label>
                <input type="range" id="brushSize" min="5" max="50" value="20" onchange="updateBrushSize()">
                <span id="brushSizeValue">20px</span>
            </div>

            <div class="tolerance-control">
                <label>Tolerance:</label>
                <input type="range" id="toleranceSlider" min="10" max="100" value="50" onchange="updateTolerance()">
                <span id="toleranceValue">50</span>
            </div>
        </div>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Sedang memproses gambar...</p>
        </div>

        <div class="preview-area" id="previewArea" style="display: none;">
            <div class="preview-container">
                <h3>🖼️ Gambar Asli</h3>
                <canvas id="originalCanvas"></canvas>
            </div>
            <div class="preview-container">
                <h3>✨ Hasil (Background Dihapus)</h3>
                <canvas id="resultCanvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        let originalImage = null;
        let processedCanvas = null;
        let processedImageData = null; // Simpan hasil background removal untuk download

        // Manual editing variables
        let currentMode = 'auto'; // 'auto' or 'manual'
        let currentTool = 'pen'; // 'pen' or 'eraser'
        let brushSize = 20;
        let tolerance = 50;
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let history = []; // For undo/redo
        let historyIndex = -1;

        // Canvas contexts for manual editing
        let resultCtx = null;

        // Drag and drop handlers
        function dragOverHandler(ev) {
            ev.preventDefault();
        }

        function dragEnterHandler(ev) {
            ev.preventDefault();
            ev.target.closest('.upload-area').classList.add('dragover');
        }

        function dragLeaveHandler(ev) {
            ev.preventDefault();
            ev.target.closest('.upload-area').classList.remove('dragover');
        }

        function dropHandler(ev) {
            ev.preventDefault();
            ev.target.closest('.upload-area').classList.remove('dragover');
            
            const dt = ev.dataTransfer;
            const files = dt.files;
            
            if (files.length > 0) {
                handleFile(files[0]);
            }
        }

        function handleFile(file) {
            if (!file) return;

            // Reset state untuk gambar baru
            processedCanvas = null;
            processedImageData = null;
            currentMode = 'auto';
            history = [];
            historyIndex = -1;
            
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('downloadBtn').style.display = 'none';
            document.getElementById('toolControls').style.display = 'none';
            document.getElementById('previewArea').style.display = 'none';
            
            // Reset tool states
            setMode('auto');
            setTool('pen');
            updateBrushSize();
            updateTolerance();

            // Validasi file
            if (!file.type.startsWith('image/')) {
                showError('File harus berupa gambar!');
                return;
            }

            if (file.size > 10 * 1024 * 1024) {
                showError('Ukuran file tidak boleh lebih dari 10MB!');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    originalImage = img;
                    displayOriginalImage();
                    document.getElementById('processBtn').disabled = false;
                    hideMessages();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function displayOriginalImage() {
            const canvas = document.getElementById('originalCanvas');
            const ctx = canvas.getContext('2d');
            
            // Set canvas size
            const maxWidth = 400;
            const maxHeight = 400;
            let { width, height } = originalImage;
            
            if (width > height) {
                if (width > maxWidth) {
                    height *= maxWidth / width;
                    width = maxWidth;
                }
            } else {
                if (height > maxHeight) {
                    width *= maxHeight / height;
                    height = maxHeight;
                }
            }
            
            canvas.width = width;
            canvas.height = height;
            
            ctx.drawImage(originalImage, 0, 0, width, height);
            
            document.getElementById('previewArea').style.display = 'grid';
        }

        // Mode switching functions
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('autoModeBtn').classList.toggle('active', mode === 'auto');
            document.getElementById('manualModeBtn').classList.toggle('active', mode === 'manual');
            document.getElementById('manualTools').style.display = mode === 'manual' ? 'flex' : 'none';
            
            const resultCanvas = document.getElementById('resultCanvas');
            if (mode === 'manual') {
                resultCanvas.classList.add('drawing');
                setupManualEditing();
            } else {
                resultCanvas.classList.remove('drawing');
                removeManualEditing();
            }
        }

        function setTool(tool) {
            currentTool = tool;
            document.getElementById('penBtn').classList.toggle('active', tool === 'pen');
            document.getElementById('eraserBtn').classList.toggle('active', tool === 'eraser');
        }

        function updateBrushSize() {
            brushSize = document.getElementById('brushSize').value;
            document.getElementById('brushSizeValue').textContent = brushSize + 'px';
        }

        function updateTolerance() {
            tolerance = document.getElementById('toleranceSlider').value;
            document.getElementById('toleranceValue').textContent = tolerance;
        }

        function setupManualEditing() {
            const resultCanvas = document.getElementById('resultCanvas');
            resultCtx = resultCanvas.getContext('2d');
            
            // Add event listeners for drawing
            resultCanvas.addEventListener('mousedown', startDrawing);
            resultCanvas.addEventListener('mousemove', draw);
            resultCanvas.addEventListener('mouseup', stopDrawing);
            resultCanvas.addEventListener('mouseout', stopDrawing);
            
            // Touch events for mobile
            resultCanvas.addEventListener('touchstart', startDrawing);
            resultCanvas.addEventListener('touchmove', draw);
            resultCanvas.addEventListener('touchend', stopDrawing);
        }

        function removeManualEditing() {
            const resultCanvas = document.getElementById('resultCanvas');
            
            // Remove event listeners
            resultCanvas.removeEventListener('mousedown', startDrawing);
            resultCanvas.removeEventListener('mousemove', draw);
            resultCanvas.removeEventListener('mouseup', stopDrawing);
            resultCanvas.removeEventListener('mouseout', stopDrawing);
            resultCanvas.removeEventListener('touchstart', startDrawing);
            resultCanvas.removeEventListener('touchmove', draw);
            resultCanvas.removeEventListener('touchend', stopDrawing);
        }

        function startDrawing(e) {
            isDrawing = true;
            const rect = e.target.getBoundingClientRect();
            lastX = (e.clientX || e.touches[0].clientX) - rect.left;
            lastY = (e.clientY || e.touches[0].clientY) - rect.top;
            
            // Save current state for undo
            saveState();
            
            e.preventDefault();
        }

        function draw(e) {
            if (!isDrawing) return;
            
            const rect = e.target.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            
            resultCtx.globalCompositeOperation = currentTool === 'eraser' ? 'destination-out' : 'source-over';
            resultCtx.strokeStyle = currentTool === 'eraser' ? 'rgba(255,255,255,1)' : 'rgba(0,0,0,1)';
            resultCtx.lineWidth = brushSize;
            resultCtx.lineCap = 'round';
            resultCtx.lineJoin = 'round';
            
            resultCtx.beginPath();
            resultCtx.moveTo(lastX, lastY);
            resultCtx.lineTo(x, y);
            resultCtx.stroke();
            
            lastX = x;
            lastY = y;
            
            e.preventDefault();
        }

        function stopDrawing(e) {
            if (isDrawing) {
                isDrawing = false;
                updateUndoRedoButtons();
            }
        }

        function saveState() {
            const resultCanvas = document.getElementById('resultCanvas');
            const imageData = resultCtx.getImageData(0, 0, resultCanvas.width, resultCanvas.height);
            
            // Remove old history after current index
            history = history.slice(0, historyIndex + 1);
            
            // Add new state
            history.push(new ImageData(new Uint8ClampedArray(imageData.data), imageData.width, imageData.height));
            historyIndex++;
            
            // Limit history to 20 states
            if (history.length > 20) {
                history.shift();
                historyIndex--;
            }
            
            updateUndoRedoButtons();
            
            // Update processedImageData for download
            processedImageData = new ImageData(new Uint8ClampedArray(imageData.data), imageData.width, imageData.height);
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                const resultCanvas = document.getElementById('resultCanvas');
                resultCtx.putImageData(history[historyIndex], 0, 0);
                updateUndoRedoButtons();
            }
        }

        function redo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                const resultCanvas = document.getElementById('resultCanvas');
                resultCtx.putImageData(history[historyIndex], 0, 0);
                updateUndoRedoButtons();
            }
        }

        function updateUndoRedoButtons() {
            document.getElementById('undoBtn').disabled = historyIndex <= 0;
            document.getElementById('redoBtn').disabled = historyIndex >= history.length - 1;
        }

        function removeBackground() {
            if (!originalImage) return;

            showLoading();
            document.getElementById('processBtn').disabled = true;
            
            setTimeout(() => {
                try {
                    processImageWithChromaKey();
                    showSuccess('Background berhasil dihapus! Klik Manual untuk edit lebih lanjut');
                    document.getElementById('downloadBtn').disabled = false;
                    document.getElementById('downloadBtn').style.display = 'inline-block';
                    document.getElementById('toolControls').style.display = 'flex';
                } catch (error) {
                    showError('Terjadi kesalahan saat memproses gambar.');
                    console.error(error);
                } finally {
                    hideLoading();
                    document.getElementById('processBtn').disabled = false;
                }
            }, 500);
        }

        function processImageWithChromaKey() {
            const resultCanvas = document.getElementById('resultCanvas');
            const ctx = resultCanvas.getContext('2d');
            resultCtx = ctx; // Set global context for manual editing
            
            // Set canvas size sama dengan original
            const originalCanvas = document.getElementById('originalCanvas');
            resultCanvas.width = originalCanvas.width;
            resultCanvas.height = originalCanvas.height;
            
            // Draw original image
            ctx.drawImage(originalCanvas, 0, 0);
            
            // Get image data
            const imageData = ctx.getImageData(0, 0, resultCanvas.width, resultCanvas.height);
            const data = imageData.data;
            
            // Enhanced background removal algorithm
            const processedData = enhancedBackgroundRemoval(data, resultCanvas.width, resultCanvas.height);
            
            // Apply processed data
            for (let i = 0; i < data.length; i++) {
                data[i] = processedData[i];
            }
            
            // Apply processed image data
            ctx.putImageData(imageData, 0, 0);
            
            // Simpan hasil imageData sebelum checkerboard untuk download
            processedImageData = new ImageData(new Uint8ClampedArray(data), imageData.width, imageData.height);
            processedCanvas = resultCanvas;
            
            // Initialize history for undo/redo
            history = [new ImageData(new Uint8ClampedArray(data), imageData.width, imageData.height)];
            historyIndex = 0;
            
            // Add checkerboard background to show transparency
            addCheckerboardBackground();
        }

        function enhancedBackgroundRemoval(data, width, height) {
            const processedData = new Uint8ClampedArray(data);
            
            // Step 1: Detect background color with improved sampling
            const bgColor = detectBackgroundColor(data, width, height);
            
            // Step 2: Create mask with improved edge detection
            const mask = createBackgroundMask(data, width, height, bgColor);
            
            // Step 3: Apply morphological operations to clean up the mask
            const cleanedMask = morphologicalOperations(mask, width, height);
            
            // Step 4: Apply feathering for smooth edges
            const featheredMask = applyFeathering(cleanedMask, data, width, height);
            
            // Step 5: Apply mask to create final result
            for (let i = 0; i < processedData.length; i += 4) {
                const alpha = featheredMask[i / 4];
                processedData[i + 3] = alpha; // Set alpha channel
            }
            
            return processedData;
        }

        function detectBackgroundColor(data, width, height) {
            const samples = [];
            
            // Sample from corners and edges with more points
            const samplePoints = [
                [0, 0], [width-1, 0], [0, height-1], [width-1, height-1], // corners
                [Math.floor(width/4), 0], [Math.floor(3*width/4), 0], // top edge
                [Math.floor(width/4), height-1], [Math.floor(3*width/4), height-1], // bottom edge
                [0, Math.floor(height/4)], [0, Math.floor(3*height/4)], // left edge
                [width-1, Math.floor(height/4)], [width-1, Math.floor(3*height/4)], // right edge
                [Math.floor(width/2), Math.floor(height/2)] // center (sometimes useful)
            ];
            
            for (let point of samplePoints) {
                const x = Math.max(0, Math.min(width-1, point[0]));
                const y = Math.max(0, Math.min(height-1, point[1]));
                const idx = (y * width + x) * 4;
                samples.push({
                    r: data[idx],
                    g: data[idx + 1],
                    b: data[idx + 2]
                });
            }
            
            // Calculate weighted average (give more weight to corners)
            let totalWeight = 0;
            let avgR = 0, avgG = 0, avgB = 0;
            
            for (let i = 0; i < samples.length; i++) {
                const weight = i < 4 ? 2 : 1; // Corners get double weight
                avgR += samples[i].r * weight;
                avgG += samples[i].g * weight;
                avgB += samples[i].b * weight;
                totalWeight += weight;
            }
            
            return {
                r: Math.round(avgR / totalWeight),
                g: Math.round(avgG / totalWeight),
                b: Math.round(avgB / totalWeight)
            };
        }

        function createBackgroundMask(data, width, height, bgColor) {
            const mask = new Uint8Array(width * height);
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = (y * width + x) * 4;
                    const r = data[idx];
                    const g = data[idx + 1];
                    const b = data[idx + 2];
                    
                    // Calculate color distance
                    const distance = Math.sqrt(
                        Math.pow(r - bgColor.r, 2) +
                        Math.pow(g - bgColor.g, 2) +
                        Math.pow(b - bgColor.b, 2)
                    );
                    
                    // Create mask (255 = background, 0 = foreground)
                    mask[y * width + x] = distance <= tolerance ? 255 : 0;
                }
            }
            
            return mask;
        }

        function morphologicalOperations(mask, width, height) {
            // Simple morphological closing to fill small holes
            const cleaned = new Uint8Array(mask);
            
            // Dilate then erode (closing operation)
            const dilated = dilateMask(mask, width, height);
            const eroded = erodeMask(dilated, width, height);
            
            return eroded;
        }

        function dilateMask(mask, width, height) {
            const result = new Uint8Array(mask);
            
            for (let y = 1; y < height - 1; y++) {
                for (let x = 1; x < width - 1; x++) {
                    const idx = y * width + x;
                    if (mask[idx] === 255) {
                        // Set 3x3 neighborhood to 255
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                const nidx = (y + dy) * width + (x + dx);
                                result[nidx] = 255;
                            }
                        }
                    }
                }
            }
            
            return result;
        }

        function erodeMask(mask, width, height) {
            const result = new Uint8Array(mask);
            
            for (let y = 1; y < height - 1; y++) {
                for (let x = 1; x < width - 1; x++) {
                    const idx = y * width + x;
                    if (mask[idx] === 0) {
                        // Set 3x3 neighborhood to 0
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                const nidx = (y + dy) * width + (x + dx);
                                result[nidx] = 0;
                            }
                        }
                    }
                }
            }
            
            return result;
        }

        function applyFeathering(mask, data, width, height) {
            const result = new Uint8Array(width * height);
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = y * width + x;
                    
                    if (mask[idx] === 255) {
                        // Check if this is an edge pixel
                        let isEdge = false;
                        for (let dy = -1; dy <= 1 && !isEdge; dy++) {
                            for (let dx = -1; dx <= 1 && !isEdge; dx++) {
                                const nx = x + dx;
                                const ny = y + dy;
                                if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                                    const nidx = ny * width + nx;
                                    if (mask[nidx] === 0) {
                                        isEdge = true;
                                    }
                                }
                            }
                        }
                        
                        if (isEdge) {
                            // Apply feathering to edge pixels
                            result[idx] = Math.max(0, 255 - tolerance);
                        } else {
                            result[idx] = 0; // Fully transparent
                        }
                    } else {
                        result[idx] = 255; // Fully opaque
                    }
                }
            }
            
            return result;
        }

        function addCheckerboardBackground() {
            const canvas = document.getElementById('resultCanvas');
            const ctx = canvas.getContext('2d');
            
            // Create temporary canvas with checkerboard
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            
            // Draw checkerboard pattern
            const squareSize = 20;
            for (let x = 0; x < canvas.width; x += squareSize) {
                for (let y = 0; y < canvas.height; y += squareSize) {
                    const isEven = (Math.floor(x / squareSize) + Math.floor(y / squareSize)) % 2 === 0;
                    tempCtx.fillStyle = isEven ? '#f0f0f0' : '#e0e0e0';
                    tempCtx.fillRect(x, y, squareSize, squareSize);
                }
            }
            
            // Draw processed image on top
            tempCtx.drawImage(canvas, 0, 0);
            
            // Replace canvas content
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(tempCanvas, 0, 0);
        }

        function downloadResult() {
            if (!processedCanvas) return;
            
            // Buat canvas baru untuk download hasil transparan
            const downloadCanvas = document.createElement('canvas');
            const downloadCtx = downloadCanvas.getContext('2d');
            downloadCanvas.width = processedCanvas.width;
            downloadCanvas.height = processedCanvas.height;
            
            // Gunakan hasil editing terakhir dari history atau processedImageData
            if (history.length > 0 && historyIndex >= 0) {
                downloadCtx.putImageData(history[historyIndex], 0, 0);
            } else if (processedImageData) {
                downloadCtx.putImageData(processedImageData, 0, 0);
            } else {
                // Fallback: ambil dari canvas result
                downloadCtx.drawImage(processedCanvas, 0, 0);
            }
            
            // Download sebagai PNG transparan
            downloadCanvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'background-removed.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 'image/png');
        }

        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('progressBar').style.display = 'block';
            
            // Simulate progress
            let progress = 0;
            const progressFill = document.getElementById('progressFill');
            const interval = setInterval(() => {
                progress += Math.random() * 30;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                }
                progressFill.style.width = progress + '%';
            }, 100);
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('progressBar').style.display = 'none';
            document.getElementById('progressFill').style.width = '0%';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMsg');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        function hideMessages() {
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }
    </script>
